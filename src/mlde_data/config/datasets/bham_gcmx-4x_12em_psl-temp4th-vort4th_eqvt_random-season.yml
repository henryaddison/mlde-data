  - variable: temp500
  - variable: temp700
  - variable: temp850
  - variable: vorticity250
  - variable: vorticity500
  - variable: vorticity700
  - variable: vorticity850
split:
  scheme: random-season
  val_prop: 0.15
  test_prop: 0.15
  seed: 42
