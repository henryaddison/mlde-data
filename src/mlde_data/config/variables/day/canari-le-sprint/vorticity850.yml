variable: psl
attrs:
  units: s-1
  standard_name: relative_vorticity
  grid_mapping: rotated_latitude_longitude
  long_name: Relative vorticity at 850 hPa
sources:
  type: canari-le-sprint
  collection: canari-le-sprint
  variables:
    - name: xwind850
      frequency: day
    - name: ywind850
      frequency: day
spec:
  - action: vorticity
    parameters:
      theta: 850
  - action: regrid_to_target
  - action: select-subdomain
    parameters:
      domain: $domain
  # implicit final actions: assign attrs, save
